name: CoinSwitch Momentum Trading Bot

on:
  schedule:
    - cron: "*/15 * * * *"   # Every 15 minutes, 24/7 — 96 cycles/day
  workflow_dispatch:           # Manual trigger from GitHub Actions UI

# Cancel any in-progress run if a new one starts (prevents overlap)
concurrency:
  group: trading-bot
  cancel-in-progress: false   # Never cancel — let the running cycle finish

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 13       # Slightly more than 15-min schedule window

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Restore persisted state between runs ────────────────────────────────
      # State files persist open trades, processed signals, PnL, and circuit
      # breaker across the 15-minute GitHub Actions cycles.
      - name: Restore trade state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            open_trades_cs.json
            open_trades_delta.json
            processed_signals.json
            daily_pnl.json
            last_daily_report.txt
            circuit_breaker.json
          key: trade-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trade-state-${{ runner.os }}-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        env:
          CS_API_KEY:           ${{ secrets.CS_API_KEY }}
          CS_API_SECRET:        ${{ secrets.CS_API_SECRET }}
          DELTA_API_KEY:        ${{ secrets.DELTA_API_KEY }}
          DELTA_API_SECRET:     ${{ secrets.DELTA_API_SECRET }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          PAPER_TRADING_MODE:   ${{ vars.PAPER_TRADING_MODE || 'false' }}
          WATCHLIST:            ${{ vars.WATCHLIST || '' }}
        run: |
          cd $GITHUB_WORKSPACE
          python main.py

      # ── Always save state, even on failure ─────────────────────────────────
      - name: Save trade state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            open_trades_cs.json
            open_trades_delta.json
            processed_signals.json
            daily_pnl.json
            last_daily_report.txt
            circuit_breaker.json
          key: trade-state-${{ runner.os }}-${{ github.run_id }}

      # ── Upload logs for debugging ───────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: |
            bot.log
            agent_audit.jsonl
          retention-days: 7
          if-no-files-found: ignore
